<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard · Complaint System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/student-dashboard.css">
</head>
<body class="dark-yellow">
    <div class="dashboard">
        <header class="dashboard-header">
            <h1 class="logo">Student Portal</h1>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <a href="../complaint.html" class="btn btn-primary">+ New Complaint</a>
                <button id="logoutBtn" class="btn btn-outline">Logout</button>
            </div>
        </header>

        <main class="dashboard-main">
            <h2>My Complaints</h2>
            <div id="complaintsList" class="complaints-grid">
                <div class="loading-state">Loading your complaints...</div>
            </div>
        </main>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Edit Complaint</h3>
            <form id="editForm">
                <h5>Title</h5>
                <div class="input-group">
                    <input type="text" id="editTitle" placeholder=" " required />
                    <label for="editTitle">Title</label>
                </div>
                <h5>Description</h5>
                <div class="input-group">
                    <textarea id="editDescription" placeholder=" " required rows="4"></textarea>
                    <label for="editDescription">Description</label>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-outline" id="cancelEdit">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <div id="deleteModal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <h3>Confirm Deletion</h3>
            <p style="margin: 1rem 0; color: var(--text-secondary);">Are you sure you want to delete this complaint? This action cannot be undone.</p>
            <div class="modal-actions">
                <button type="button" class="btn btn-outline" id="cancelDelete">Cancel</button>
                <button type="button" class="btn btn-primary" id="confirmDelete" style="background: #ef4444; border-color: #ef4444; color: white;">Delete</button>
            </div>
        </div>
    </div>

    <script src="../js/theme.js"></script>
    <script type="module" src="../js/student.js"></script>
</body>
</html>
